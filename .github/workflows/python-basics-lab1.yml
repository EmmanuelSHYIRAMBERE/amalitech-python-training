name: CI — Python Basics Lab 1 · Student Course Management

on:
  push:
    branches:
      - fix/lab1-student-course-management
      - develop
    paths:
      - "labs/python-basics/lab-1-student-course-management/**"
      - ".github/workflows/python-basics-lab1.yml"
  pull_request:
    branches:
      - develop
    paths:
      - "labs/python-basics/lab-1-student-course-management/**"
      - ".github/workflows/python-basics-lab1.yml"

defaults:
  run:
    working-directory: labs/python-basics/lab-1-student-course-management

jobs:
  # ── 1. Lint & format ────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install ruff black

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Black format check
        run: black --check src/ tests/

  # ── 2. Type check ───────────────────────────────────────────────────────────
  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: mypy
        run: poetry run mypy src/ --ignore-missing-imports

  # ── 3. Test & coverage ──────────────────────────────────────────────────────
  test:
    name: Pytest & Coverage
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests with coverage
        run: >
          poetry run pytest
          --tb=short -q
          --cov=src
          --cov-report=term-missing
          --cov-fail-under=80

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: labs/python-basics/lab-1-student-course-management/.coverage
          retention-days: 7
