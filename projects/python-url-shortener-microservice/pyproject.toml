[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.lint.isort]
known-third-party = ["django", "rest_framework", "drf_spectacular", "decouple"]

[tool.mypy]
python_version = "3.11"
strict = true
explicit_package_bases = true
mypy_path = "projects/python-url-shortener-microservice"
plugins = ["mypy_django_plugin.main", "mypy_drf_plugin.main"]

[[tool.mypy.overrides]]
module = ["decouple", "decouple.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["tests.*", "manage"]
ignore_errors = true

[tool.django-stubs]
django_settings_module = "config.settings"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
pythonpath = ["."]
addopts = "-v --tb=short"
testpaths = ["tests"]

[tool.coverage.run]
source = ["shortener", "core", "api"]
omit = ["*/migrations/*", "manage.py"]

[tool.coverage.report]
show_missing = true
skip_covered = false
