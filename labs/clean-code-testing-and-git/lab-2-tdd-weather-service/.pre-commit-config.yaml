repos:
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        files: ^labs/clean-code-testing-and-git/lab-2-tdd-weather-service/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^labs/clean-code-testing-and-git/lab-2-tdd-weather-service/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^labs/clean-code-testing-and-git/lab-2-tdd-weather-service/src/
        args: [--strict, --ignore-missing-imports]
